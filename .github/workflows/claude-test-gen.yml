name: Claude Test Generation & Auto-Run

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  generate-and-run:
    name: Write Tests → Run → Fix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Claude — Write/update tests per CLAUDE.md rules
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read CLAUDE.md fully. Follow the Test Strategy section as your complete guide.
            Sync the "Specific test cases" section in CLAUDE.md with the current code.
            Write or update tests to cover all functions and endpoints.
            Run the tests. Fix any failures. Commit and push everything.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio httpx pytest-mock

      - name: Pull latest commits
        run: git pull

      - name: Run tests
        id: run_tests
        run: pytest tests/ -v --tb=short 2>&1 | tee test_output.txt
        continue-on-error: true

      - name: Claude — Fix failing tests
        if: steps.run_tests.outcome == 'failure'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Tests are failing. Read test_output.txt and tests/test_app.py.
            Fix the test code so all tests pass. Follow the Test Strategy in CLAUDE.md.
            Do not remove or weaken tests. Commit and push the fix.

      - name: Re-run after fix
        if: steps.run_tests.outcome == 'failure'
        run: |
          git pull
          pytest tests/ -v --tb=short
