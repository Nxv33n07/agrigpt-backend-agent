name: Claude Test Generation & Auto-Run

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "app.py"
      - "*.py"

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  generate-and-run:
    name: Write Tests → Commit → Run → Fix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Claude writes files only — workflow handles git
      - name: Claude — Write tests
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read CLAUDE.md. Follow the Test Strategy section.
            Update the "Specific test cases" section in CLAUDE.md for any code changes.
            Write or update tests/test_app.py and create tests/__init__.py if missing.
            Do NOT run git commands. Just write the files.

      # Workflow commits whatever Claude wrote
      - name: Commit tests if changed
        run: |
          git add CLAUDE.md tests/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "test: auto-generate tests via Claude [skip ci]"
            git push origin ${{ github.head_ref }}
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio httpx pytest-mock

      - name: Run tests
        id: run_tests
        run: |
          if [ ! -d "tests" ]; then
            echo "No tests directory found after generation"
            exit 1
          fi
          pytest tests/ -v --tb=short 2>&1 | tee test_output.txt
        continue-on-error: true

      # Claude fixes failures — workflow commits the fix
      - name: Claude — Fix failing tests
        if: steps.run_tests.outcome == 'failure'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Tests are failing. Read test_output.txt and tests/test_app.py.
            Fix tests/test_app.py so all tests pass. Follow Test Strategy in CLAUDE.md.
            Do NOT run git commands. Just fix the file.

      - name: Commit fix if changed
        if: steps.run_tests.outcome == 'failure'
        run: |
          git add tests/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "test: fix failing tests via Claude [skip ci]"
            git push origin ${{ github.head_ref }}
          fi

      - name: Re-run tests after fix
        if: steps.run_tests.outcome == 'failure'
        run: pytest tests/ -v --tb=short
