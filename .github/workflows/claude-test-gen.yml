name: Claude Test Generation & Auto-Run

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  generate-and-run:
    name: Write Tests → Run → Fix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Claude — Write/update tests per CLAUDE.md rules
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            Read CLAUDE.md fully. Follow the Test Strategy section as your complete guide.
            Sync the "Specific test cases" section in CLAUDE.md with the current code.
            Write or update tests/test_app.py and tests/__init__.py to cover all functions and endpoints.
            After writing, run: git add CLAUDE.md tests/ && git commit -m "test: auto-generate tests [skip ci]" && git push
            Then run the tests: pytest tests/ -v --tb=short

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio httpx pytest-mock

      - name: Pull latest commits
        run: git pull

      - name: Run tests
        id: run_tests
        run: pytest tests/ -v --tb=short 2>&1 | tee test_output.txt
        continue-on-error: true

      - name: Claude — Fix failing tests
        if: steps.run_tests.outcome == 'failure'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            Tests are failing. Read test_output.txt and tests/test_app.py.
            Fix the test code so all tests pass. Follow the Test Strategy in CLAUDE.md.
            Do not remove or weaken tests.
            After fixing, run: git add tests/ && git commit -m "test: fix failing tests [skip ci]" && git push

      - name: Re-run after fix
        if: steps.run_tests.outcome == 'failure'
        run: |
          git pull
          pytest tests/ -v --tb=short
