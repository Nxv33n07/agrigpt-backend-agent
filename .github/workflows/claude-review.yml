name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "app.py"
      - "**.py"
    paths-ignore:
      - "tests/**"
      - ".github/**"
      - "CLAUDE.md"
      - "setup-hooks.sh"
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude — Review PR
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read CLAUDE.md. Use the Code Review Rules section to review this pull request.
            Post a comment with:
            - What the PR does (1-2 sentences)
            - Issues found, each labelled CRITICAL / WARNING / SUGGESTION
            - Final verdict: APPROVED ✅ or CHANGES REQUESTED ❌
